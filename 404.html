<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>GlyphConnect</title>
    <script>
      // Redirect all 404s back to index.html preserving the path
      var path = window.location.pathname;
      sessionStorage.setItem('redirect', path);
      window.location.replace('/');
    </script>
  </head>
</html>
